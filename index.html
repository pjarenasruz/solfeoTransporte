<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solfeador - Tonalidad Equilibrada</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f0f2f5;
        }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            text-align: center; background: var(--bg); margin: 0; padding: 10px;
            touch-action: manipulation;
        }
        .container {
            max-width: 600px; margin: 0 auto; background: white; 
            border-radius: 20px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; margin-top: 15px;
        }
        .selector-label {
            font-size: 0.65rem; font-weight: 800; color: #95a5a6;
            text-align: left; margin: 10px 0 5px 5px; text-transform: uppercase; letter-spacing: 1px;
        }
        .horizontal-selector {
            display: flex; overflow-x: auto; gap: 10px; padding: 5px 2px 10px 2px;
            scrollbar-width: none;
        }
        .horizontal-selector::-webkit-scrollbar { display: none; }
        .clef-btn {
            width: 45px; height: 45px; border-radius: 12px;
            background: #f0f3f6; border: none; font-size: 1.8rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; color: var(--primary);
        }
        .clef-btn.active { background: var(--accent); color: white; transform: scale(1.05); }
        .pill-btn {
            flex: 0 0 auto; padding: 8px 15px; border-radius: 15px;
            background: #f0f3f6; border: none; font-weight: bold; font-size: 0.8rem;
            cursor: pointer;
        }
        .pill-btn.active { background: var(--accent); color: white; }
        .transpose-wrapper { display: flex; align-items: center; gap: 15px; padding: 5px; }
        .trans-control { width: 35px; height: 35px; border-radius: 50%; border: none; background: #eee; font-size: 1.2rem; font-weight: bold; }
        #feedback { min-height: 30px; margin-bottom: -15px; font-size: 1.1rem; font-weight: bold; transition: opacity 0.2s; }
        #canvas-container { width: 100%; display: flex; justify-content: center; min-height: 250px; }
        .button-row { display: flex; justify-content: space-between; gap: 4px; margin-top: 5px; }
        button.note-btn { flex: 1; padding: 15px 0; font-size: 0.85rem; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 10px; }
        .info-bar { display: flex; justify-content: flex-start; font-size: 0.85rem; color: #7f8c8d; padding: 0 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="selector-label">Clave</div>
        <div class="horizontal-selector">
            <button class="clef-btn active" onclick="setClef('treble', this)">𝄞</button>
            <button class="clef-btn" onclick="setClef('bass', this)">𝄢</button>
            <button class="clef-btn" onclick="setClef('alto', this)">𝄡</button>
        </div>

        <div class="selector-label">Nivel</div>
        <div id="lvl-picker" class="horizontal-selector"></div>

        <div class="selector-label">Transportar</div>
        <div class="transpose-wrapper">
            <button class="trans-control" onclick="changeTranspose(-2)">-</button>
            <div id="trans-label" style="font-weight:bold; min-width:60px;">0 Tonos</div>
            <button class="trans-control" onclick="changeTranspose(2)">+</button>
        </div>

        <div class="info-bar"><span id="score">Racha: 0</span></div>
        <div id="feedback"></div>
        <div id="canvas-container"><div id="boo"></div></div>

        <div class="button-row">
            <button class="note-btn" onclick="checkAnswer('Do')">Do</button>
            <button class="note-btn" onclick="checkAnswer('Re')">Re</button>
            <button class="note-btn" onclick="checkAnswer('Mi')">Mi</button>
            <button class="note-btn" onclick="checkAnswer('Fa')">Fa</button>
            <button class="note-btn" onclick="checkAnswer('Sol')">Sol</button>
            <button class="note-btn" onclick="checkAnswer('La')">La</button>
            <button class="note-btn" onclick="checkAnswer('Si')">Si</button>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter } = Vex.Flow;
        const noteNames = ["Do", "Do#", "Re", "Re#", "Mi", "Fa", "Fa#", "Sol", "Sol#", "La", "La#", "Si"];
        const keyToToneIndex = { "c": 0, "d": 2, "e": 4, "f": 5, "g": 7, "a": 9, "b": 11 };
        
        const baseNotes = [
            "c/1","d/1","e/1","f/1","g/1","a/1","b/1",
            "c/2","d/2","e/2","f/2","g/2","a/2","b/2",
            "c/3","d/3","e/3","f/3","g/3","a/3","b/3",
            "c/4","d/4","e/4","f/4","g/4","a/4","b/4",
            "c/5","d/5","e/5","f/5","g/5","a/5","b/5",
            "c/6","d/6","e/6","f/6","g/6","a/6","b/6","c/7"
        ];

        // Índices exactos corregidos para las tónicas en baseNotes
        const clefTonics = {
            "treble": 25, // Sol/4
            "bass": 17,   // Do/3
            "alto": 21    // Do/4
        };

        // Límites de 4 líneas adicionales
        const physicalLimits = {
            "treble": { min: 14, max: 45 }, // La/2 a Sol/6
            "bass": { min: 4, max: 35 },   // Do/1 a Do/5
            "alto": { min: 11, max: 42 }   // Do/2 a Do/6
        };

        let currentClef = "treble", currentLevelIdx = 0, currentNoteKey = "", currentCorrectAnswer = "";
        let transposeSemiTones = 0, hits = 0, feedbackTimeout = null;

        function setClef(c, b) {
            currentClef = c;
            document.querySelectorAll('.clef-btn').forEach(el => el.classList.remove('active'));
            b.classList.add('active');
            setLevel(0, true);
        }

        function changeTranspose(s) {
            let n = transposeSemiTones + s;
            if (n >= -12 && n <= 12) { transposeSemiTones = n; updateTransposeLabel(); hits = 0; generateNote(); }
        }

        function updateTransposeLabel() {
            let t = transposeSemiTones / 2;
            document.getElementById('trans-label').innerText = `${t > 0 ? '+' : ''}${t} Tono${Math.abs(t)==1?'':'s'}`;
        }

        function setLevel(i, r) {
            currentLevelIdx = i; if (r) hits = 0;
            document.querySelectorAll('#lvl-picker .pill-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));
            generateNote();
        }

        function generateNote() {
            const div = document.getElementById("boo"); div.innerHTML = "";
            const renderer = new Renderer(div, Renderer.Backends.SVG);
            renderer.resize(320, 250); 
            const ctx = renderer.getContext(); ctx.scale(1.1, 1.1);
            
            const stave = new Stave(10, 80, 280); 
            stave.addClef(currentClef).setContext(ctx).draw();

            const tonic = clefTonics[currentClef];
            const limit = physicalLimits[currentClef];
            
            // Ajustamos el span para que el Nivel 1 (idx 0) ya tenga un rango de +/- 3 notas
            let span = currentLevelIdx + 3; 
            let minIdx = tonic - span;
            let maxIdx = tonic + span;

            // Lógica de topes
            if (minIdx < limit.min) {
                let diff = limit.min - minIdx;
                minIdx = limit.min;
                maxIdx = Math.min(maxIdx + diff, limit.max);
            }
            if (maxIdx > limit.max) {
                let diff = maxIdx - limit.max;
                maxIdx = limit.max;
                minIdx = Math.max(minIdx - diff, limit.min);
            }

            const available = baseNotes.slice(minIdx, maxIdx + 1);
            let nK; 
            do { nK = available[Math.floor(Math.random()*available.length)]; } 
            while (nK === currentNoteKey && available.length > 1);
            
            currentNoteKey = nK;
            let bL = nK.split('/')[0]; 
            let bI = keyToToneIndex[bL];
            let tI = (bI + transposeSemiTones) % 12; if (tI < 0) tI += 12;
            currentCorrectAnswer = noteNames[tI].replace('#', '');

            const note = new StaveNote({ clef: currentClef, keys: [nK], duration: "q" });
            const voice = new Voice({ num_beats: 1, beat_value: 4 }).addTickables([note]);
            new Formatter().joinVoices([voice]).format([voice], 150); 
            voice.draw(ctx, stave);
            
            document.getElementById('score').innerText = `Racha: ${hits}`;
        }

        function checkAnswer(n) {
            const f = document.getElementById("feedback"); clearTimeout(feedbackTimeout);
            if (n === currentCorrectAnswer) {
                hits++;
                if (hits >= 20 && currentLevelIdx < 9) { 
                    f.style.color = "var(--accent)"; f.innerText = "¡NIVEL SUPERADO!"; 
                    setLevel(currentLevelIdx + 1, false); hits = 0; 
                }
                else { f.style.color = "var(--success)"; f.innerText = "¡Correcto!"; generateNote(); }
            } else { 
                hits = 0; f.style.color = "var(--error)"; 
                f.innerText = `Error: era ${currentCorrectAnswer.toUpperCase()}`; 
                generateNote(); 
            }
            f.style.opacity = "1"; feedbackTimeout = setTimeout(() => f.style.opacity = "0", 800);
        }

        function initLevels() {
            const c = document.getElementById('lvl-picker');
            for(let i=0; i<10; i++) {
                const b = document.createElement('button'); 
                b.className = `pill-btn ${i===0?'active':''}`; 
                b.innerText = `Lvl ${i+1}`; b.id = `btn-lvl-${i}`;
                b.onclick = () => setLevel(i, true); 
                c.appendChild(b);
            }
        }

        initLevels(); updateTransposeLabel(); setLevel(0);
    </script>
</body>
</html>
