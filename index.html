<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bombardino Sib Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f0f2f5;
        }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            text-align: center; background: var(--bg); margin: 0; padding: 10px;
        }
        .container {
            max-width: 600px; margin: 0 auto; background: white; 
            border-radius: 20px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; margin-top: 15px;
        }
        .selector-label {
            font-size: 0.65rem; font-weight: 800; color: #95a5a6;
            text-align: left; margin: 10px 0 5px 5px; text-transform: uppercase; letter-spacing: 1px;
        }
        
        .horizontal-selector {
            display: flex; overflow-x: auto; gap: 8px; padding: 10px 5px; 
            -webkit-overflow-scrolling: touch; justify-content: flex-start; align-items: center;
        }
        .horizontal-selector::-webkit-scrollbar { display: none; }
        
        .clef-btn, .pill-btn, #custom-range-toggle {
            background: #f0f3f6; border: none; cursor: pointer; transition: all 0.2s; 
            color: var(--primary); font-weight: bold; white-space: nowrap; flex-shrink: 0;
            padding: 10px 18px; border-radius: 15px; font-size: 0.85rem;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .clef-btn { width: 48px; height: 48px; padding: 0; border-radius: 12px; font-size: 1.8rem; }
        
        .clef-btn.active, .current-level, #custom-range-toggle.active-mode { 
            background: var(--accent) !important; color: white !important; transform: scale(1.03);
        }
        
        /* Panel de Configuración por Botones */
        #custom-config-panel {
            display: none; background: #f9fbff; border: 2px solid var(--accent); border-radius: 15px;
            margin: 15px 0; padding: 15px;
        }
        #config-canvas-container { 
            background: white; border-radius: 8px; min-height: 220px; border: 1px solid #eee;
        }
        .range-controls {
            display: flex; justify-content: space-around; margin-top: 15px;
        }
        .control-group { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .step-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: var(--primary); color: white; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        .step-btn:active { transform: scale(0.9); background: var(--accent); }

        .info-header { display: flex; justify-content: flex-start; margin-bottom: 5px; padding-left: 5px; }
        #score-display { font-size: 0.9rem; color: #7f8c8d; font-weight: bold; }
        #feedback { min-height: 45px; font-size: 1rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        #canvas-container { width: 100%; display: flex; justify-content: center; min-height: 200px; }
        
        .button-row { display: flex; justify-content: space-between; gap: 5px; margin-top: 15px; touch-action: manipulation; }
        button.note-btn { flex: 1; padding: 20px 0; font-size: 0.9rem; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="selector-label">Clave</div>
        <div class="horizontal-selector">
            <button class="clef-btn active" onclick="setClef('treble', this)">𝄞</button>
            <button class="clef-btn" onclick="setClef('bass', this)">𝄢</button>
            <button class="clef-btn" onclick="setClef('alto', this)">𝄡</button>
        </div>

        <div class="selector-label">Niveles</div>
        <div id="lvl-picker" class="horizontal-selector"></div>

        <div style="text-align: left; padding-left: 5px; margin-top: 5px;">
            <button id="custom-range-toggle" onclick="openRangeConfig()">
                Definir rango de notas
            </button>
        </div>

        <div id="custom-config-panel">
            <div style="font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; color: var(--primary);">
                Usa los botones para ajustar la nota inicial y final
            </div>
            <div id="config-canvas-container"></div>
            
            <div class="range-controls">
                <div class="control-group">
                    <span style="font-size: 0.7rem; font-weight: bold;">NOTA INICIAL</span>
                    <button class="step-btn" onclick="adjustRange(0, 1)">+</button>
                    <button class="step-btn" onclick="adjustRange(0, -1)">-</button>
                </div>
                <div class="control-group">
                    <span style="font-size: 0.7rem; font-weight: bold;">NOTA FINAL</span>
                    <button class="step-btn" onclick="adjustRange(1, 1)">+</button>
                    <button class="step-btn" onclick="adjustRange(1, -1)">-</button>
                </div>
            </div>

            <button class="pill-btn active" onclick="closeRangeConfig()" style="margin-top: 20px; width: 100%; height: 45px; background: var(--success) !important; color: white;">
                CONFIRMAR RANGO
            </button>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <div class="info-header">
            <div id="score-display">Racha: 0</div>
        </div>
        <div id="feedback"></div>
        
        <div id="canvas-container"><div id="boo"></div></div>

        <div class="button-row">
            <button class="note-btn" onclick="checkAnswer('Do')">Do</button>
            <button class="note-btn" onclick="checkAnswer('Re')">Re</button>
            <button class="note-btn" onclick="checkAnswer('Mi')">Mi</button>
            <button class="note-btn" onclick="checkAnswer('Fa')">Fa</button>
            <button class="note-btn" onclick="checkAnswer('Sol')">Sol</button>
            <button class="note-btn" onclick="checkAnswer('La')">La</button>
            <button class="note-btn" onclick="checkAnswer('Si')">Si</button>
        </div>
    </div>

    <script>
        const { Renderer, Stave, StaveNote, Voice, Formatter } = Vex.Flow;
        const noteNames = ["Do", "Do#", "Re", "Re#", "Mi", "Fa", "Fa#", "Sol", "Sol#", "La", "La#", "Si"];
        const keyToToneIndex = { "c": 0, "d": 2, "e": 4, "f": 5, "g": 7, "a": 9, "b": 11 };
        const baseNotes = ["c/1", "d/1", "e/1", "f/1", "g/1", "a/1", "b/1", "c/2", "d/2", "e/2", "f/2", "g/2", "a/2", "b/2", "c/3", "d/3", "e/3", "f/3", "g/3", "a/3", "b/3", "c/4", "d/4", "e/4", "f/4", "g/4", "a/4", "b/4", "c/5", "d/5", "e/5", "f/5", "g/5", "a/5", "b/5", "c/6"];
        const clefGeometricCenters = { "treble": 27, "bass": 15, "alto": 21 };

        let currentClef = "treble", currentLevelIdx = 0, currentNoteKey = "", currentCorrectAnswer = "";
        let hits = 0, feedbackTimeout = null;
        let isCustomMode = false, customIndices = [24, 30];

        function initLevels() {
            const container = document.getElementById('lvl-picker');
            container.innerHTML = "";
            for(let i=1; i<=10; i++) {
                const btn = document.createElement('button');
                btn.className = "pill-btn";
                btn.innerText = "Lvl " + i;
                btn.id = "btn-lvl-" + (i-1);
                btn.onclick = () => setLevel(i-1, true);
                container.appendChild(btn);
            }
        }

        function setLevel(idx, reset) {
            isCustomMode = false;
            currentLevelIdx = idx;
            if (reset) hits = 0;
            document.getElementById('custom-range-toggle').classList.remove('active-mode');
            document.querySelectorAll('#lvl-picker .pill-btn').forEach(b => b.classList.remove('current-level'));
            const activeBtn = document.getElementById("btn-lvl-" + idx);
            if (activeBtn) activeBtn.classList.add('current-level');
            generateNote();
        }

        function setClef(c, el) {
            currentClef = c;
            document.querySelectorAll('.clef-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const center = clefGeometricCenters[c];
            customIndices = [center - 2, center + 2];
            setLevel(0, true);
        }

        function openRangeConfig() {
            document.getElementById('custom-config-panel').style.display = 'block';
            drawConfigStave();
        }

        function adjustRange(idx, delta) {
            let newVal = customIndices[idx] + delta;
            if (newVal >= 0 && newVal < baseNotes.length) {
                customIndices[idx] = newVal;
                drawConfigStave();
            }
        }

        function drawConfigStave() {
            const div = document.getElementById("config-canvas-container");
            div.innerHTML = "";
            const renderer = new Renderer(div, Renderer.Backends.SVG);
            renderer.resize(300, 220);
            const ctx = renderer.getContext();
            const stave = new Stave(10, 60, 260);
            stave.addClef(currentClef).setContext(ctx).draw();

            // Dibujar las dos notas negras definitorias
            const notes = customIndices.map(idx => new StaveNote({ clef: currentClef, keys: [baseNotes[idx]], duration: "q" }));
            const voice = new Voice({ num_beats: 2, beat_value: 4 }).addTickables(notes);
            new Formatter().joinVoices([voice]).format([voice], 180);
            voice.draw(ctx, stave);
        }

        function closeRangeConfig() {
            customIndices.sort((a,b) => a - b);
            isCustomMode = true;
            document.getElementById('custom-range-toggle').classList.add('active-mode');
            document.querySelectorAll('#lvl-picker .pill-btn').forEach(b => b.classList.remove('current-level'));
            document.getElementById('custom-config-panel').style.display = 'none';
            hits = 0;
            generateNote();
        }

        function generateNote() {
            const div = document.getElementById("boo"); div.innerHTML = "";
            const renderer = new Renderer(div, Renderer.Backends.SVG);
            renderer.resize(320, 200); const ctx = renderer.getContext(); ctx.scale(1.1, 1.1);
            const stave = new Stave(10, 40, 280); stave.addClef(currentClef).setContext(ctx).draw();
            
            let available;
            if (isCustomMode) {
                available = baseNotes.slice(customIndices[0], customIndices[1] + 1);
            } else {
                const center = clefGeometricCenters[currentClef]; 
                const span = currentLevelIdx + 1;
                available = baseNotes.slice(Math.max(0, center - span), Math.min(baseNotes.length - 1, center + span) + 1);
            }

            let nK; 
            do { nK = available[Math.floor(Math.random()*available.length)]; } while (nK === currentNoteKey && available.length > 1);
            currentNoteKey = nK;
            
            let bL = nK.split('/')[0]; 
            currentCorrectAnswer = noteNames[keyToToneIndex[bL]].replace('#', '');

            const note = new StaveNote({ clef: currentClef, keys: [nK], duration: "q" });
            const voice = new Voice({ num_beats: 1, beat_value: 4 }).addTickables([note]);
            new Formatter().joinVoices([voice]).format([voice], 150); 
            voice.draw(ctx, stave);
            document.getElementById('score-display').innerText = `Racha: ${hits}`;
        }

        function checkAnswer(n) {
            const f = document.getElementById("feedback"); clearTimeout(feedbackTimeout);
            if (n === currentCorrectAnswer) {
                hits++;
                if (isCustomMode && hits === 20) {
                    f.style.color = "var(--accent)"; f.innerText = "¡Enhorabuena! 20 aciertos en este rango. Prueba ampliándolo.";
                    generateNote();
                } else if (!isCustomMode && hits >= 20 && currentLevelIdx < 9) { 
                    f.style.color = "var(--accent)"; f.innerText = "¡NIVEL SUPERADO!"; setLevel(currentLevelIdx + 1, false);
                } else { 
                    f.style.color = "var(--success)"; f.innerText = "¡Correcto!"; generateNote(); 
                }
            } else { 
                hits = 0; f.style.color = "var(--error)"; f.innerText = `Error: era ${currentCorrectAnswer.toUpperCase()}`; generateNote(); 
            }
            f.style.opacity = "1"; feedbackTimeout = setTimeout(() => f.style.opacity = "0", 2500);
        }

        initLevels();
        setLevel(0, true);
    </script>
</body>
</html>
